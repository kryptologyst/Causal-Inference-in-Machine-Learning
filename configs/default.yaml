# Default configuration for causal inference experiments

# True average treatment effect (for synthetic data)
true_ate: 2.0

# Evaluation settings
confidence_level: 0.95
n_bootstrap: 1000

# Model configurations
models:
  psm:
    enabled: true
    caliper: 0.1
    n_neighbors: 1
    replace: false
  
  ipw:
    enabled: true
    trim_weights: true
    weight_threshold: 0.1
  
  double_ml:
    enabled: true
    n_folds: 5
  
  causal_forest:
    enabled: true
    n_estimators: 100
    max_depth: null
    min_samples_split: 20
    min_samples_leaf: 10
    bootstrap: true

# Data generation settings
data:
  synthetic:
    n_samples: 1000
    n_features: 5
    n_confounders: 3
    noise_level: 0.1
  
  heterogeneous:
    n_samples: 1000
    n_features: 5
    treatment_effect_range: [0.5, 3.0]

# Visualization settings
visualization:
  save_plots: true
  plot_format: "png"
  dpi: 300
  figure_size: [10, 6]

# Logging settings
logging:
  level: "INFO"
  file: "causal_inference.log"
